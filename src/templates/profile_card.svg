<svg xmlns="http://www.w3.org/2000/svg" width="495" height="{{ card_height }}" viewBox="0 0 495 {{ card_height }}">
  <defs>
    <style>
      .bg { fill: #ffffff; stroke: #e4e2e2; stroke-width: 1px; }
      .header-icon { fill: #2f80ed; }
      .header-text { font: 600 18px 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif; fill: #2f80ed; }
      .stat-icon { fill: #586069; }
      .stat-label { font: 400 14px 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif; fill: #586069; }
      .stat-val { font: 600 15px 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif; fill: #24292e; }
      .stat-add { font: 600 15px 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif; fill: #28a745; }
      .stat-del { font: 600 15px 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif; fill: #d73a49; }
      .lang-name { font: 400 12px 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif; fill: #24292e; }
      .lang-pct { font: 600 12px 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif; fill: #586069; }
      .section-text { font: 600 15px 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif; fill: #24292e; }
      .divider { stroke: #e4e2e2; stroke-width: 1px; }
      .lang-bar-bg { fill: #eaecef; }

      @media (prefers-color-scheme: dark) {
        .bg { fill: #0d1117; stroke: #30363d; }
        .header-icon { fill: #58a6ff; }
        .header-text { fill: #58a6ff; }
        .stat-icon { fill: #8b949e; }
        .stat-label { fill: #8b949e; }
        .stat-val { fill: #c9d1d9; }
        .stat-add { fill: #3fb950; }
        .stat-del { fill: #f85149; }
        .lang-name { fill: #c9d1d9; }
        .lang-pct { fill: #8b949e; }
        .section-text { fill: #c9d1d9; }
        .divider { stroke: #30363d; }
        .lang-bar-bg { fill: #30363d; }
      }
    </style>
    <clipPath id="bar-clip">
      <rect x="25" y="180" width="445" height="10" rx="5"/>
    </clipPath>
  </defs>

  <rect width="494" height="{{ card_height - 1 }}" x="0.5" y="0.5" rx="6" class="bg"/>

  <!-- Header -->
  <g transform="translate(25, 22)">
    <svg width="20" height="20" viewBox="0 0 16 16" class="header-icon">
      <path d="M10.561 8.073a6.005 6.005 0 0 1 3.432 5.142.75.75 0 1 1-1.498.07 4.5 4.5 0 0 0-8.99 0 .75.75 0 0 1-1.498-.07 6.004 6.004 0 0 1 3.431-5.142 3.999 3.999 0 1 1 5.123 0ZM10.5 5a2.5 2.5 0 1 0-5 0 2.5 2.5 0 0 0 5 0Z"></path>
    </svg>
    <text x="26" y="16" class="header-text">{{ username }}'s Git Stats</text>
  </g>

  <!-- Row 1: Commits and Repos -->
  <g transform="translate(25, 65)">
    <!-- Commits -->
    <svg width="16" height="16" viewBox="0 0 16 16" class="stat-icon" y="-12">
      <path d="M10.5 7.75a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0Zm1.43.75a4.002 4.002 0 0 1-7.86 0H.75a.75.75 0 1 1 0-1.5h3.32a4.001 4.001 0 0 1 7.86 0h3.32a.75.75 0 1 1 0 1.5h-3.32Z"></path>
    </svg>
    <text x="22" y="0" class="stat-label">Total Commits:</text>
    <text x="135" y="0" class="stat-val">{{ total_commits }}</text>

    <!-- Public Repos -->
    <g transform="translate(240, 0)">
      <svg width="16" height="16" viewBox="0 0 16 16" class="stat-icon" y="-12">
        <path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8ZM5 12.25a.25.25 0 0 1 .25-.25h3.5a.25.25 0 0 1 .25.25v3.25a.25.25 0 0 1-.4.2l-1.45-1.087a.25.25 0 0 1-.3 0L5.4 15.7a.25.25 0 0 1-.4-.2Z"></path>
      </svg>
      <text x="22" y="0" class="stat-label">Public Repos:</text>
      <text x="135" y="0" class="stat-val">{{ public_repos }}</text>
    </g>
  </g>

  <!-- Row 2: Additions and Deletions -->
  <g transform="translate(25, 100)">
    <!-- Additions -->
    <svg width="16" height="16" viewBox="0 0 16 16" class="stat-icon" y="-12">
      <path d="M7.75 2a.75.75 0 0 1 .75.75V7h4.25a.75.75 0 0 1 0 1.5H8.5v4.25a.75.75 0 0 1-1.5 0V8.5H2.75a.75.75 0 0 1 0-1.5H7V2.75A.75.75 0 0 1 7.75 2Z"></path>
    </svg>
    <text x="22" y="0" class="stat-label">Lines Added:</text>
    <text x="135" y="0" class="stat-add">+{{ total_additions }}</text>

    <!-- Deletions -->
    <g transform="translate(240, 0)">
      <svg width="16" height="16" viewBox="0 0 16 16" class="stat-icon" y="-12">
        <path d="M2.75 7.75h10.5a.75.75 0 0 1 0 1.5H2.75a.75.75 0 0 1 0-1.5Z"></path>
      </svg>
      <text x="22" y="0" class="stat-label">Lines Deleted:</text>
      <text x="135" y="0" class="stat-del">-{{ total_deletions }}</text>
    </g>
  </g>

  {% if languages | length > 0 %}
  <!-- Divider -->
  <line x1="25" y1="135" x2="470" y2="135" class="divider" />
  
  <text x="25" y="165" class="section-text">Most Used Languages</text>

  <!-- Progress Bar Background -->
  <rect x="25" y="180" width="445" height="10" rx="5" class="lang-bar-bg"/>
  
  <!-- Language Bars -->
  <g clip-path="url(#bar-clip)">
    {% for lang in languages %}
    <rect x="{{ lang.bar_x }}" y="180" width="{{ lang.bar_w }}" height="10" fill="{{ lang.color }}"/>
    {% endfor %}
  </g>

  <!-- Language Legend -->
  {% for lang in languages %}
  <circle cx="{{ lang.dot_cx }}" cy="{{ lang.dot_cy }}" r="4" fill="{{ lang.color }}"/>
  <text x="{{ lang.text_x }}" y="{{ lang.text_y }}" class="lang-name">{{ lang.name }}</text>
  <text x="{{ lang.pct_x }}" y="{{ lang.text_y }}" class="lang-pct">{{ lang.pct }}%</text>
  {% endfor %}
  {% endif %}
</svg>